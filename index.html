<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Workshop Figma</title>
</head>

<body>
    <main>
        <span class="box">
            <section class="screen" id="screen1">
                <div class="first-screen">
                    <article class="maskot-article">
                        <span class="text-container">
                            <h3>Маскот</h3>
                            <p>(персонаж)</p>
                        </span>
                        <span class="maskot-image">
                            <img class="m-img1"
                                src="images/Снимок экрана 2026-03-26 213111-no-bg-preview (carve.photos) 1.png"
                                alt="ps4">
                            <img class="m-img2"
                                src="images/Снимок экрана 2026-03-26 213923-no-bg-preview (carve.photos) 1.png"
                                alt="xbox">
                        </span>
                    </article>
                    <article class="humor">
                        <h3>Юмор</h3>
                        <img class="zombie" src="images/Minecraft 1.png" alt="зомби на свинье">
                    </article>
                </div>
                <div class="second-screen-container">
                    <span class="comm-and-pers-container">
                        <article class="comm">
                            <h3>Живая Коммуникация</h3>
                            <p>Привет, User! Закупись лучшими игровыми девайсами!</p>
                        </article>
                        <article class="pers">
                            <span class="pers-box">
                                <h3>Персонализация</h3>
                                <button class="switcher">
                                    <div class="switch-toggle"></div>
                                </button>
                            </span>
                        </article>
                    </span>
                    <article class="emotion">
                        <h2>Эмоциональный Дизайн</h2>
                    </article>
                </div>
            </section>
            <section class="screen" id="screen2">
                <article class="gameif">
                    <span class="text-container">
                        <h3>Геймификация</h3>
                        <p>(челленджи,
                            награды, игры
                            и задания)</p>
                    </span>
                    <img class="gameif-img" src="images/Frame 123138.png" alt="игровая клавиатура">
                </article>
                <article class="gameif">
                    <h3>Микро-взаимодействия</h3>
                    <img class="gameif-img2" src="images/mouse2016 1.png" alt="игровая мышь">
                </article>
            </section>
        </span>
        <section class="screen" id="screen3">
            <article class="expr">
                <h3>Выразительные Образы</h3>
                <img src="images/s-l1600-no-bg-preview (carve.photos) 1.png" alt="старый геймпад">
            </article>
            <article class="vid">
                <h3 id="white">Видео и анимация</h3>
            </article>
        </section>
    </main>
</body>

</html>
